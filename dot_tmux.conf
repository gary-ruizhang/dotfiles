# ZENWRITTEN LIGHT THEME BEGIN

# 基础调色板 (Zenwritten Light Palette)
color_bg="#EEEEEE"        # 对应 Alacritty 的 Background
color_fg="#353535"        # 对应 Alacritty 的 Foreground
color_cursor="#353535"

# 核心强调色
color_magenta="#88507D"   # Zen 主题色 (用于选中/高亮)
color_red="#A8334C"       # 错误/警告
color_green="#4F6C31"     # 成功/Prefix模式
color_blue="#286486"      # 信息/时间
color_orange="#944927"    # 警告/Zoom (对应 Yellow)
color_cyan="#3B8992"

# 灰阶过渡 (从亮到暗)
# gray1 (背景) -> gray9 (前景)
color_gray1="#EEEEEE"     # 最亮 (背景)
color_gray2="#E4E4E4"     # 稍暗 (状态栏背景)
color_gray3="#D7D7D7"     # 选中区域背景
color_gray4="#C6C3C3"     # 浅灰 (非活跃文本)
color_gray5="#AAAAAA"     # 中灰 (分割线)
color_gray6="#8E8E8E"     # 深灰 (次要文本)
color_gray7="#5C5C5C"     # 更深灰
color_gray8="#353535"     # 正文灰 (主要文本)
color_gray9="#191919"     # 极深灰

# by default window names will just be their index
set-option -g automatic-rename              on
set-option -g automatic-rename-format       "#I"

# set to 12 for a 12-hour clock
set-option -g clock-mode-style              24 
set-option -g clock-mode-colour             "$color_magenta"

# NOTE: color variable expansion only works in double quotes
# 状态栏整体：浅色背景，深色文字
set-option -g status-fg                     "$color_gray8"
set-option -g status-bg                     "$color_gray1" 

# 复制模式高亮
set-option -g copy-mode-current-match-style "fg=$color_gray1,bg=$color_magenta"
set-option -g copy-mode-match-style         "fg=$color_gray1,bg=$color_gray6"

# 菜单样式
set-option -g menu-selected-style           "fg=$color_gray1,bg=$color_magenta"
set-option -g menu-style                    "fg=$color_gray8,bg=$color_gray2"

# 消息/命令行样式
set-option -g message-style                 "bg=$color_gray3,fg=$color_magenta" # vi-insert
set-option -g message-command-style         "bg=$color_gray3,fg=$color_gray8"   # vi-normal

# 滚动/选择模式样式
set-option -g mode-style                    "bg=$color_gray3,fg=$color_gray8"

# 窗格边框 (Active用Magenta强调)
set-option -g pane-active-border-style      "fg=$color_magenta"
set-option -g pane-border-lines             "heavy"
set-option -g pane-border-style             "fg=$color_gray4"
set-option -g popup-border-lines            "rounded"

set-option -g status-right-style            "fg=$color_gray6"
set-option -g window-status-current-style   "fg=$color_gray8"
set-option -g window-status-style           "fg=$color_gray6"

# 下划线支持
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# status left look and feel
# 左侧：按下 Prefix 时变绿，平时使用 Magenta 或保持背景色
set -g status-left-length 100
set -g status-left ""
# Prefix: 绿底白字 | Normal: 浅底绿字
set -ga status-left "#{?client_prefix,#{#[bg=#{color_green},fg=#{color_gray1},bold]  #S },#{#[bg=#{color_gray1},fg=#{color_green}]  #S }}"
set -ga status-left "#[bg=#{color_gray1},fg=#{color_gray5},none]│"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
# Zoom 状态: 橙色文字
set -ga status-right "#[bg=#{color_gray1},fg=#{color_orange}]#{?window_zoomed_flag,  zoom ,}"
# 时间: 蓝色文字
set -ga status-right "#[bg=#{color_gray1},fg=#{color_blue}] 󰭦 %a %m-%d 󰅐 %H:%M "

# Configure Tmux Status Bar Background
set -g status-style "bg=#{color_gray1}"

# 非活跃窗口: 灰色文字
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{color_gray1},fg=#{color_gray5}"

# 上一个窗口 (Last Window): 蓝色文字
set -g window-status-last-style "bg=#{color_gray1},fg=#{color_blue}"

# 活动通知: 红色文字
set -g window-status-activity-style "bg=#{color_gray1},fg=#{color_red}"
set -g window-status-bell-style "bg=#{color_gray1},fg=#{color_red},bold"

# 分割线
set -gF window-status-separator "#[bg=#{color_gray1},fg=#{color_gray5}]│"

# 当前激活窗口: Magenta 背景，白色文字 (Zenwritten 特色)
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{color_magenta},fg=#{color_gray1},bold"

# ZENWRITTEN LIGHT THEME END

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
